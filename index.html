<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거래처 관리 및 출력 지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 10px; }
        .wrapper { display: flex; gap: 20px; }
        .panel { width: 350px; }
        #map { width: 1122px; height: 794px; border: 2px solid #333; } /* A4 가로 비율 */
        
        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        #searchList, #selectedList { height: 200px; overflow-y: auto; border: 1px solid #eee; margin-top: 5px; padding: 5px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
        button.del { background: #dc3545; }

        /* 인쇄 설정 */
        @media print {
            body * { visibility: hidden; }
            #map, #map * { visibility: visible; }
            #map { position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <div class="box">
            <h3>1. API 키 입력</h3>
            <input type="text" id="apiKeyInput" placeholder="카카오 JS 키 입력" style="width:200px">
            <button onclick="initMap()">활성화</button>
            <p id="keyStatus" style="color: red; font-weight: bold; margin-top: 5px;">(미활성화)</p>
        </div>
        <div class="box">
            <h3>2. 파일 업로드</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
        </div>
        <div class="box">
            <h3>3. 검색 및 선택</h3>
            <input type="text" id="searchInput" placeholder="거래처명 검색">
            <div id="searchList"></div>
        </div>
        <div class="box">
            <h3>4. 표시할 리스트</h3>
            <div id="selectedList"></div>
            <button onclick="window.print()" style="margin-top:10px; background:#28a745; width:100%;">A4 인쇄하기</button>
        </div>
    </div>
    <div id="map"></div>
</div>

<script>
    let map, geocoder, allData = [], selectedData = [], markers = [];

    function initMap() {
        const key = document.getElementById('apiKeyInput').value;
        if(!key) { alert("API 키를 먼저 입력해주세요."); return; }
        
        const script = document.createElement('script');
        script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;
        script.onload = () => {
            kakao.maps.load(() => {
                map = new kakao.maps.Map(document.getElementById('map'), {center: new kakao.maps.LatLng(37.5668, 126.9786), level: 7});
                geocoder = new kakao.maps.services.Geocoder();
                
                // 상태 표시 업데이트
                const status = document.getElementById('keyStatus');
                status.innerText = "(활성화 완료)";
                status.style.color = "green";
                alert("지도 활성화 완료!");
            });
        };
        document.head.appendChild(script);
    }

    document.getElementById('excelFile').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const wb = XLSX.read(e.target.result, {type: 'array'});
            allData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            alert("파일 로드 완료! 검색을 시작하세요.");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    };

    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value;
        const list = document.getElementById('searchList');
        list.innerHTML = '';
        if(!val) return;
        
        allData.filter(d => d['거래처명'] && d['거래처명'].includes(val)).forEach(d => {
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            // JSON 문자열 처리 수정
            const dataStr = JSON.stringify(d).replace(/"/g, '&quot;');
            div.innerHTML = `<button onclick="addToSelection(${dataStr})">+</button> ${d['거래처명']}`;
            list.appendChild(div);
        });
    };

    function addToSelection(data) {
        if (!selectedData.find(d => d['거래처명'] === data['거래처명'])) {
            selectedData.push(data);
            renderSelectedList();
            updateMap();
        }
    }

    function renderSelectedList() {
        const list = document.getElementById('selectedList');
        list.innerHTML = '';
        selectedData.forEach(d => {
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = `<button class="del" onclick="removeFromSelection('${d['거래처명']}')">X</button> ${d['거래처명']}`;
            list.appendChild(div);
        });
    }

    function removeFromSelection(name) {
        selectedData = selectedData.filter(d => d['거래처명'] !== name);
        renderSelectedList();
        updateMap();
    }

    function updateMap() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        const bounds = new kakao.maps.LatLngBounds();

        selectedData.forEach(d => {
            geocoder.addressSearch(d['주소'], (result, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    const pos = new kakao.maps.LatLng(result[0].y, result[0].x);
                    const marker = new kakao.maps.Marker({ map: map, position: pos });
                    const label = new kakao.maps.InfoWindow({ content: `<div style="padding:5px; font-size:12px;">${d['거래처명']}</div>` });
                    label.open(map, marker);
                    markers.push(marker);
                    bounds.extend(pos);
                    map.setBounds(bounds);
                }
            });
        });
    }
</script>
</body>
</html>
