<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거래처 관리 및 출력 지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 10px; background: #f5f5f5; }
        .wrapper { display: flex; gap: 20px; }
        .panel { width: 350px; flex-shrink: 0; }
        #map { width: 1122px; height: 794px; border: 2px solid #333; }

        .box { background: #fff; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
        .box h3 { font-size: 13px; color: #333; margin-bottom: 8px; }
        #searchList, #selectedList { height: 200px; overflow-y: auto; border: 1px solid #eee; margin-top: 5px; padding: 5px; border-radius: 4px; }
        input[type=text] { border: 1px solid #ccc; border-radius: 4px; padding: 5px 8px; font-family: inherit; font-size: 13px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
        button.del { background: #dc3545; }

        #measure-box { position: fixed; top: -9999px; left: -9999px; visibility: hidden; }
        #label-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        .lbl {
            position: absolute;
            color: #1a1a1a;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Malgun Gothic', sans-serif;
            white-space: nowrap;
            line-height: 1;
            text-shadow:
                -1.5px -1.5px 0 #fff,  1.5px -1.5px 0 #fff,
                -1.5px  1.5px 0 #fff,  1.5px  1.5px 0 #fff,
                -1.5px  0     0 #fff,  1.5px  0     0 #fff,
                 0     -1.5px 0 #fff,  0      1.5px 0 #fff;
        }

        @media print {
            body * { visibility: hidden; }
            #map-wrap, #map-wrap * { visibility: visible; }
            #map-wrap { position: absolute; left: 0; top: 0; }
            #map { border: none; }
        }
    </style>
</head>
<body>

<div id="measure-box"></div>

<div class="wrapper">
    <div class="panel">
        <div class="box">
            <h3>① API 키 입력</h3>
            <input type="text" id="apiKeyInput" placeholder="카카오 JS 키" style="width:180px">
            <button onclick="initMap()">활성화</button>
            <p id="keyStatus" style="color:red; font-size:12px; margin-top:6px;">(미활성화)</p>
        </div>
        <div class="box">
            <h3>② 파일 업로드</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
        </div>
        <div class="box">
            <h3>③ 거래처 검색</h3>
            <input type="text" id="searchInput" placeholder="업체명 검색..." style="width:100%">
            <div id="searchList"></div>
        </div>
        <div class="box">
            <h3>④ 표시 목록</h3>
            <div id="selectedList"></div>
            <button onclick="window.print()" style="margin-top:10px; background:#28a745; width:100%; padding:8px;">🖨 A4 인쇄</button>
        </div>
    </div>

    <div id="map-wrap" style="position:relative; flex-shrink:0;">
        <div id="map"></div>
        <canvas id="line-canvas" style="position:absolute;top:0;left:0;pointer-events:none;z-index:9;"></canvas>
        <div id="label-canvas"></div>
    </div>
</div>

<script>
let map, geocoder;
let allData = [], selectedData = [];
let placed = [];
let reposTimer = null;
let myCompanyPos = null; // 회사 위치 저장

const MY_COMPANY_ADDR = '경기 수원시 영통구 신원로 55';
const MAP_W    = 1122;
const MAP_H    = 794;
const MARKER_R = 6;
const PAD      = 6;
const GAP      = 6;

// ── 초기화 ───────────────────────────────────────────
function initMap() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { alert("API 키를 입력하세요."); return; }

    const lc = document.getElementById('line-canvas');
    lc.width = MAP_W; lc.height = MAP_H;

    const script = document.createElement('script');
    script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;
    script.onload = () => {
        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.2636, 127.0286),
                level: 9
            });
            geocoder = new kakao.maps.services.Geocoder();
            kakao.maps.event.addListener(map, 'idle', scheduleRepos);

            document.getElementById('keyStatus').innerText = "✅ 활성화 완료";
            document.getElementById('keyStatus').style.color = "green";

            // 회사 위치 먼저 지오코딩 후 지도 중심 이동
            geocoder.addressSearch(MY_COMPANY_ADDR, (result, status) => {
                if (status === kakao.maps.services.Status.OK) {
                    myCompanyPos = new kakao.maps.LatLng(result[0].y, result[0].x);
                    map.setCenter(myCompanyPos);
                    map.setLevel(9);
                    placeMyCompanyMarker();
                }
            });
        });
    };
    document.head.appendChild(script);
}

// ── 회사 마커 (파란색, 이름 없음) ────────────────────
function makeBlueMarkerImage() {
    const size = (MARKER_R + 2) * 2;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = size;
    const ctx = cvs.getContext('2d');
    ctx.beginPath();
    ctx.arc(size/2, size/2, MARKER_R + 1, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size/2, size/2, MARKER_R, 0, Math.PI*2);
    ctx.fillStyle = '#1971c2';
    ctx.fill();
    // 중심 흰 점
    ctx.beginPath();
    ctx.arc(size/2, size/2, 2.5, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    return cvs.toDataURL();
}

function placeMyCompanyMarker() {
    if (!myCompanyPos) return;
    const img = new kakao.maps.MarkerImage(
        makeBlueMarkerImage(),
        new kakao.maps.Size((MARKER_R+2)*2, (MARKER_R+2)*2),
        { offset: new kakao.maps.Point(MARKER_R+2, MARKER_R+2) }
    );
    new kakao.maps.Marker({ map, position: myCompanyPos, image: img, zIndex: 10 });
}

// ── 거래처 마커 (빨간색) ─────────────────────────────
function makeRedMarkerImage() {
    const size = (MARKER_R + 2) * 2;
    const cvs = document.createElement('canvas');
    cvs.width = cvs.height = size;
    const ctx = cvs.getContext('2d');
    ctx.beginPath();
    ctx.arc(size/2, size/2, MARKER_R + 1, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size/2, size/2, MARKER_R, 0, Math.PI*2);
    ctx.fillStyle = '#e63946';
    ctx.fill();
    return cvs.toDataURL();
}

// ── 파일 업로드 ──────────────────────────────────────
document.getElementById('excelFile').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        allData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        alert(`✅ 로드 완료 — 총 ${allData.length}개 거래처`);
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

// ── 검색 ─────────────────────────────────────────────
document.getElementById('searchInput').oninput = (e) => {
    const val = e.target.value;
    const list = document.getElementById('searchList');
    list.innerHTML = '';
    if (!val) return;
    allData
        .filter(d => d['거래처명'] && d['거래처명'].includes(val))
        .forEach(d => {
            const idx = allData.indexOf(d);
            const div = document.createElement('div');
            div.style.cssText = "margin-bottom:5px;font-size:12px;";
            div.innerHTML = `<button onclick="addItem(${idx})" style="padding:2px 7px;font-size:11px;">+</button> ${d['거래처명']}`;
            list.appendChild(div);
        });
};

function addItem(idx) {
    const d = allData[idx];
    if (!selectedData.find(x => x['거래처명'] === d['거래처명'])) {
        selectedData.push(d);
        renderSelectedList();
        updateMap();
    }
}
function removeItem(idx) {
    selectedData.splice(idx, 1);
    renderSelectedList();
    updateMap();
}
function renderSelectedList() {
    const list = document.getElementById('selectedList');
    list.innerHTML = '';
    selectedData.forEach((d, i) => {
        const div = document.createElement('div');
        div.style.cssText = "margin-bottom:5px;font-size:12px;";
        div.innerHTML = `<button class="del" onclick="removeItem(${i})" style="padding:2px 6px;font-size:11px;">✕</button> ${d['거래처명']}`;
        list.appendChild(div);
    });
}

// ── 라벨 크기 측정 ───────────────────────────────────
function measureLabel(text) {
    const mb = document.getElementById('measure-box');
    const el = document.createElement('div');
    el.className = 'lbl';
    el.style.position = 'static';
    el.textContent = text;
    mb.appendChild(el);
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    mb.removeChild(el);
    return { w, h };
}

// ── 지도 업데이트 ─────────────────────────────────────
function updateMap() {
    if (!map) { alert("먼저 지도를 활성화하세요."); return; }

    placed.forEach(p => p.marker.setMap(null));
    placed = [];
    clearCanvas();

    if (selectedData.length === 0) return;

    const redImg = new kakao.maps.MarkerImage(
        makeRedMarkerImage(),
        new kakao.maps.Size((MARKER_R+2)*2, (MARKER_R+2)*2),
        { offset: new kakao.maps.Point(MARKER_R+2, MARKER_R+2) }
    );

    // 회사 위치를 bounds에 포함시켜 중심 유지
    const bounds = new kakao.maps.LatLngBounds();
    if (myCompanyPos) bounds.extend(myCompanyPos);

    let pending = selectedData.length;

    selectedData.forEach(d => {
        geocoder.addressSearch(d['주소'], (result, status) => {
            if (status === kakao.maps.services.Status.OK) {
                const pos = new kakao.maps.LatLng(result[0].y, result[0].x);
                const marker = new kakao.maps.Marker({ map, position: pos, image: redImg });
                const { w, h } = measureLabel(d['거래처명']);
                placed.push({ marker, pos, name: d['거래처명'], lw: w, lh: h });
                bounds.extend(pos);
            }
            pending--;
            if (pending === 0) {
                if (!bounds.isEmpty()) map.setBounds(bounds);
                setTimeout(repositionLabels, 600);
            }
        });
    });
}

function clearCanvas() {
    document.getElementById('label-canvas').innerHTML = '';
    const lc = document.getElementById('line-canvas');
    if (lc.getContext) lc.getContext('2d').clearRect(0, 0, MAP_W, MAP_H);
}

function toContainerPx(latLng) {
    const proj     = map.getProjection();
    const mapPt    = proj.pointFromCoords(latLng);
    const centerPt = proj.pointFromCoords(map.getCenter());
    return {
        x: MAP_W / 2 + (mapPt.x - centerPt.x),
        y: MAP_H / 2 + (mapPt.y - centerPt.y),
    };
}

function scheduleRepos() {
    clearTimeout(reposTimer);
    reposTimer = setTimeout(repositionLabels, 200);
}

// ── 겹침 해소 + 렌더링 ───────────────────────────────
function repositionLabels() {
    if (!map || placed.length === 0) return;
    clearCanvas();

    const items = placed.map(p => {
        const { x, y } = toContainerPx(p.pos);
        return {
            name: p.name,
            mx: x, my: y,
            lw: p.lw, lh: p.lh,
            lx: x + MARKER_R + GAP,
            ly: y - p.lh / 2,
        };
    });

    function candidates(it) {
        const { mx, my, lw, lh } = it;
        const r = MARKER_R + GAP;
        return [
            { lx: mx + r,      ly: my - lh / 2 },   // 오른쪽 (기본)
            { lx: mx - r - lw, ly: my - lh / 2 },   // 왼쪽
            { lx: mx - lw / 2, ly: my - r - lh },   // 위
            { lx: mx - lw / 2, ly: my + r },         // 아래
            { lx: mx + r,      ly: my - lh - 2 },   // 오른쪽 위
            { lx: mx + r,      ly: my + 2 },         // 오른쪽 아래
            { lx: mx - r - lw, ly: my - lh - 2 },   // 왼쪽 위
            { lx: mx - r - lw, ly: my + 2 },         // 왼쪽 아래
            ...spiral(r + 10, 160, 7).map(([ox, oy]) => ({
                lx: mx + ox - lw / 2,
                ly: my + oy - lh / 2,
            })),
        ];
    }

    function spiral(startR, maxR, step) {
        const pts = [];
        for (let r = startR; r <= maxR; r += step) {
            const n = Math.max(8, Math.round(2 * Math.PI * r / step));
            for (let i = 0; i < n; i++) {
                const a = (2 * Math.PI * i) / n;
                pts.push([Math.cos(a) * r, Math.sin(a) * r]);
            }
        }
        return pts;
    }

    function overlaps(a, b) {
        return !(a.lx + a.lw + PAD < b.lx ||
                 b.lx + b.lw + PAD < a.lx ||
                 a.ly + a.lh + PAD < b.ly ||
                 b.ly + b.lh + PAD < a.ly);
    }

    const settled = [];
    items.forEach(cur => {
        const cands = candidates(cur);
        let found = false;
        for (const { lx, ly } of cands) {
            cur.lx = lx; cur.ly = ly;
            if (settled.every(s => !overlaps(cur, s))) { found = true; break; }
        }
        if (!found) {
            cur.lx = cur.mx + MARKER_R + GAP;
            cur.ly = cur.my - cur.lh / 2;
        }
        settled.push(cur);
    });

    // ── 연결선 ───────────────────────────────────────
    const lc  = document.getElementById('line-canvas');
    const ctx = lc.getContext('2d');
    ctx.clearRect(0, 0, MAP_W, MAP_H);

    settled.forEach(it => {
        const labelCx = it.lx + it.lw / 2;
        const labelCy = it.ly + it.lh / 2;
        const dx = labelCx - it.mx;
        const dy = labelCy - it.my;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 2) return;

        const ux = dx / dist, uy = dy / dist;
        const sx = it.mx + ux * (MARKER_R + 2);
        const sy = it.my + uy * (MARKER_R + 2);
        const ex = labelCx - ux * (it.lw / 2 + 1);
        const ey = labelCy - uy * (it.lh / 2 + 1);

        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = 'rgba(60,60,60,0.45)';
        ctx.lineWidth   = 1;
        ctx.setLineDash([3, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
    });

    // ── 라벨 DOM ─────────────────────────────────────
    const canvas = document.getElementById('label-canvas');
    settled.forEach(it => {
        const el = document.createElement('div');
        el.className = 'lbl';
        el.style.left = it.lx + 'px';
        el.style.top  = it.ly + 'px';
        el.textContent = it.name;
        canvas.appendChild(el);
    });
}
</script>
</body>
</html>
