<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거래처 관리 및 출력 지도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 10px; }
        .wrapper { display: flex; gap: 20px; }
        .panel { width: 350px; flex-shrink: 0; }
        #map { width: 1122px; height: 794px; border: 2px solid #333; position: relative; }

        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        #searchList, #selectedList { height: 200px; overflow-y: auto; border: 1px solid #eee; margin-top: 5px; padding: 5px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 3px; }
        button.del { background: #dc3545; }

        #measure-box {
            position: fixed;
            top: -9999px;
            left: -9999px;
            visibility: hidden;
        }

        #label-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .lbl {
            position: absolute;
            background: rgba(255,255,255,0.93);
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 11px;
            font-family: 'Malgun Gothic', sans-serif;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
            line-height: 1.5;
        }

        .lbl-line {
            position: absolute;
            border-left: 1px dashed #888;
            pointer-events: none;
            transform-origin: top left;
        }

        @media print {
            body * { visibility: hidden; }
            #map, #map *, #label-canvas, #label-canvas * { visibility: visible; }
            #map { position: absolute; left: 0; top: 0; width: 100%; border: none; }
        }
    </style>
</head>
<body>

<div id="measure-box"></div>

<div class="wrapper">
    <div class="panel">
        <div class="box">
            <h3>1. API 키 입력</h3>
            <input type="text" id="apiKeyInput" placeholder="카카오 JS 키 입력" style="width:200px">
            <button onclick="initMap()">활성화</button>
            <p id="keyStatus" style="color:red; font-weight:bold; margin-top:5px;">(미활성화)</p>
        </div>
        <div class="box">
            <h3>2. 파일 업로드</h3>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
        </div>
        <div class="box">
            <h3>3. 검색 및 선택</h3>
            <input type="text" id="searchInput" placeholder="거래처명 검색">
            <div id="searchList"></div>
        </div>
        <div class="box">
            <h3>4. 표시할 리스트</h3>
            <div id="selectedList"></div>
            <button onclick="window.print()" style="margin-top:10px; background:#28a745; width:100%;">A4 인쇄하기</button>
        </div>
    </div>

    <div style="position:relative;">
        <div id="map"></div>
        <div id="label-canvas"></div>
    </div>
</div>

<script>
let map, geocoder;
let allData = [], selectedData = [];
let placed = [];
let reposTimer = null;

const MARKER_H = 34;
const PAD      = 4;

function initMap() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { alert("API 키를 먼저 입력해주세요."); return; }

    const script = document.createElement('script');
    script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${key}&libraries=services&autoload=false`;
    script.onload = () => {
        kakao.maps.load(() => {
            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.2636, 127.0286),
                level: 9
            });
            geocoder = new kakao.maps.services.Geocoder();
            kakao.maps.event.addListener(map, 'idle', scheduleRepos);

            document.getElementById('keyStatus').innerText = "(활성화 완료)";
            document.getElementById('keyStatus').style.color = "green";
        });
    };
    document.head.appendChild(script);
}

document.getElementById('excelFile').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        allData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        alert(`파일 로드 완료! 총 ${allData.length}개 거래처`);
    };
    reader.readAsArrayBuffer(e.target.files[0]);
};

document.getElementById('searchInput').oninput = (e) => {
    const val = e.target.value;
    const list = document.getElementById('searchList');
    list.innerHTML = '';
    if (!val) return;
    allData
        .filter(d => d['거래처명'] && d['거래처명'].includes(val))
        .forEach(d => {
            const idx = allData.indexOf(d);
            const div = document.createElement('div');
            div.style.marginBottom = "5px";
            div.innerHTML = `<button onclick="addItem(${idx})">+</button> ${d['거래처명']}`;
            list.appendChild(div);
        });
};

function addItem(idx) {
    const d = allData[idx];
    if (!selectedData.find(x => x['거래처명'] === d['거래처명'])) {
        selectedData.push(d);
        renderSelectedList();
        updateMap();
    }
}

function removeItem(idx) {
    selectedData.splice(idx, 1);
    renderSelectedList();
    updateMap();
}

function renderSelectedList() {
    const list = document.getElementById('selectedList');
    list.innerHTML = '';
    selectedData.forEach((d, i) => {
        const div = document.createElement('div');
        div.style.marginBottom = "5px";
        div.innerHTML = `<button class="del" onclick="removeItem(${i})">X</button> ${d['거래처명']}`;
        list.appendChild(div);
    });
}

function measureLabel(text) {
    const mb = document.getElementById('measure-box');
    const el = document.createElement('div');
    el.className = 'lbl';
    el.style.position = 'static';
    el.textContent = text;
    mb.appendChild(el);
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    mb.removeChild(el);
    return { w, h };
}

function updateMap() {
    if (!map) { alert("먼저 API 키로 지도를 활성화하세요."); return; }

    placed.forEach(p => p.marker.setMap(null));
    placed = [];
    clearCanvas();

    if (selectedData.length === 0) return;

    const bounds = new kakao.maps.LatLngBounds();
    let pending = selectedData.length;

    selectedData.forEach(d => {
        geocoder.addressSearch(d['주소'], (result, status) => {
            if (status === kakao.maps.services.Status.OK) {
                const pos = new kakao.maps.LatLng(result[0].y, result[0].x);
                const marker = new kakao.maps.Marker({ map, position: pos });
                const { w, h } = measureLabel(d['거래처명']);
                placed.push({ marker, pos, name: d['거래처명'], lw: w, lh: h });
                bounds.extend(pos);
            }
            pending--;
            if (pending === 0) {
                if (!bounds.isEmpty()) map.setBounds(bounds);
                setTimeout(repositionLabels, 600);
            }
        });
    });
}

function clearCanvas() {
    document.getElementById('label-canvas').innerHTML = '';
}

function toContainerPx(latLng) {
    const proj = map.getProjection();
    const mapPt    = proj.pointFromCoords(latLng);
    const centerPt = proj.pointFromCoords(map.getCenter());
    const mapEl = document.getElementById('map');
    const cx = mapEl.offsetWidth  / 2;
    const cy = mapEl.offsetHeight / 2;
    return {
        x: cx + (mapPt.x - centerPt.x),
        y: cy + (mapPt.y - centerPt.y),
    };
}

function scheduleRepos() {
    clearTimeout(reposTimer);
    reposTimer = setTimeout(repositionLabels, 200);
}

function repositionLabels() {
    if (!map || placed.length === 0) return;
    clearCanvas();

    const items = placed.map(p => {
        const { x, y } = toContainerPx(p.pos);
        return {
            name: p.name,
            mx: x,
            my: y,
            lw: p.lw,
            lh: p.lh,
            lx: x - p.lw / 2,
            ly: y - MARKER_H - p.lh - 2,
        };
    });

    function spiral(maxR, step) {
        const pts = [[0, 0]];
        for (let r = step; r <= maxR; r += step) {
            const n = Math.max(8, Math.round(2 * Math.PI * r / step));
            for (let i = 0; i < n; i++) {
                const a = (2 * Math.PI * i) / n;
                pts.push([Math.cos(a) * r, Math.sin(a) * r]);
            }
        }
        return pts;
    }
    const OFFSETS = spiral(150, 6);

    function overlaps(a, b) {
        return !(a.lx + a.lw + PAD < b.lx ||
                 b.lx + b.lw + PAD < a.lx ||
                 a.ly + a.lh + PAD < b.ly ||
                 b.ly + b.lh + PAD < a.ly);
    }

    const settled = [];

    items.forEach(cur => {
        const baseLx = cur.mx - cur.lw / 2;
        const baseLy = cur.my - MARKER_H - cur.lh - 2;
        let found = false;

        for (const [ox, oy] of OFFSETS) {
            cur.lx = baseLx + ox;
            cur.ly = baseLy + oy;
            if (settled.every(s => !overlaps(cur, s))) {
                found = true;
                break;
            }
        }
        if (!found) { cur.lx = baseLx; cur.ly = baseLy; }
        settled.push(cur);
    });

    const canvas = document.getElementById('label-canvas');

    settled.forEach(it => {
        const markerCx = it.mx;
        const markerCy = it.my - MARKER_H / 2;
        const labelCx  = it.lx + it.lw / 2;
        const labelCy  = it.ly + it.lh / 2;

        const dx = labelCx - markerCx;
        const dy = labelCy - markerCy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > it.lw / 2 + 6) {
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'lbl-line';
            line.style.left   = markerCx + 'px';
            line.style.top    = markerCy + 'px';
            line.style.height = dist + 'px';
            line.style.transform = `rotate(${angle + 90}deg)`;
            canvas.appendChild(line);
        }

        const el = document.createElement('div');
        el.className = 'lbl';
        el.style.left = it.lx + 'px';
        el.style.top  = it.ly + 'px';
        el.textContent = it.name;
        canvas.appendChild(el);
    });
}
</script>
</body>
</html>
